<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal - BYEM GYM</title>
  <link rel="stylesheet" href="../../css/main.css">
  <!-- Run guard script first to prevent UI flash -->
  <script src="../../js/core/guard.js"></script>
</head>
<body class="dashboard-body">

  <div id="admin-navbar-container"></div>

  <main class="dashboard-container">
    <aside class="dashboard-sidebar glass-panel">
      <div class="profile-header">
        <div class="avatar admin-avatar">A</div>
        <h2 id="adminName">System Administrator</h2>
        <span class="badge gold">SUPERADMIN</span>
      </div>

      <nav class="dashboard-nav">
        <a href="#users" class="nav-link active" data-target="users-panel">Manage Members</a>
        <a href="#classes" class="nav-link" data-target="classes-panel">Manage Classes</a>
        <button id="logoutBtn" class="btn btn-outline" style="margin-top: 2rem;">Sign Out</button>
      </nav>
    </aside>

    <div class="dashboard-content admin-panels">
      
      <!-- Users Panel -->
      <section id="users-panel" class="admin-panel active">
        <header class="panel-header">
          <h2>Member Directory</h2>
        </header>
        <div class="table-responsive glass-panel">
          <table class="admin-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name / Email</th>
                <th>Role</th>
                <th>Membership</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <!-- Rendered via JS -->
            </tbody>
          </table>
        </div>
      </section>

      <!-- Classes Panel -->
      <section id="classes-panel" class="admin-panel hidden">
        <header class="panel-header">
          <h2>Class Schedule</h2>
          <button id="btnCreateClass" class="btn btn-primary">Create New Class</button>
        </header>

        <!-- New Class Form (Hidden by default) -->
        <div id="classFormContainer" class="glass-panel hidden" style="margin-bottom: 2rem;">
          <h3>Schedule a Class</h3>
          <form id="createClassForm" class="auth-form">
            <div class="form-group">
              <label for="className">Class Name</label>
              <input type="text" id="className" required placeholder="e.g. HIIT Inferno">
            </div>
            
            <div class="form-grid">
              <div class="form-group">
                <label for="classDate">Date</label>
                <input type="date" id="classDate" required>
              </div>
              <div class="form-group">
                <label for="classTime">Time</label>
                <input type="time" id="classTime" required>
              </div>
            </div>

            <div class="form-grid">
             <div class="form-group">
                <label for="classTrainer">Trainer</label>
                <input type="text" id="classTrainer" required placeholder="e.g. Sarah">
              </div>
              <div class="form-group">
                <label for="classCapacity">Capacity</label>
                <input type="number" id="classCapacity" required min="1" max="50" value="20">
              </div>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Save Class</button>
              <button type="button" id="btnCancelClass" class="btn btn-outline">Cancel</button>
            </div>
          </form>
        </div>

        <div class="admin-grid" id="adminClassesGrid">
          <!-- Rendered via JS -->
        </div>
      </section>

    </div>
  </main>

  <script type="module" src="../../js/app.js"></script>
  <script type="module" src="../../js/pages/admin.js"></script>
</body>
</html>
