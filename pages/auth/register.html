<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/main.css">
  <script type="module" src="/js/core/app.js" defer></script>
  <script type="module" src="/js/pages/register.js" defer></script>
  <title>Register | BYEM GYM</title>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main id="main-content">
    <div class="auth-container">
      <div class="auth-card">
        
        <div class="auth-header">
          <h1 class="text-gold">JOIN THE ELITE</h1>
          <p class="text-secondary">Register to start your pursuit of greatness.</p>
        </div>



        <form id="registerForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="fullname">Full Name</label>
            <input type="text" id="fullname" class="form-control" placeholder="John Doe" required>
            <span class="form-error-msg" id="err-fullname">Name is required.</span>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
            <span class="form-error-msg" id="err-email">Valid email is required.</span>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="6-12 Characters" required>
            <span class="form-error-msg" id="err-password">Must be 6 to 12 characters.</span>
          </div>

          <div class="form-group" style="margin-bottom: var(--space-6);">
            <label class="form-label" for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
            <span class="form-error-msg" id="err-confirm-password">Passwords do not match.</span>
          </div>

          <button type="submit" class="btn btn-primary btn-block">Confirm Application</button>
        </form>

        <div class="auth-footer">
          Already a member? <a href="/pages/auth/login.html">Login Here</a>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
</body>
</html>
