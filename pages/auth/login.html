<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/main.css">
  <script type="module" src="/js/core/app.js" defer></script>
  <script type="module" src="/js/pages/login.js" defer></script>
  <title>Login | BYEM GYM</title>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main id="main-content">
    <div class="auth-container">
      <div class="auth-card">
        
        <div class="auth-header">
          <h1 class="text-gold">ACCESS PORTAL</h1>
          <p class="text-secondary">Enter your credentials to continue.</p>
        </div>



        <form id="loginForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input type="email" id="email" class="form-control" placeholder="member@example.com" required>
            <span class="form-error-msg" id="err-email">Invalid email footprint.</span>
          </div>

          <div class="form-group" style="margin-bottom: var(--space-6);">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            <span class="form-error-msg" id="err-password">Password is required.</span>
          </div>

          <button type="submit" class="btn btn-primary btn-block">Authenticate</button>
        </form>

        <div class="auth-footer">
          Don't have an account? <a href="/pages/auth/register.html">Apply Here</a>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
</body>
</html>
